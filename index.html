<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message For You</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        #container {
            padding: 30px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            position: relative;
            min-height: 450px;
        }
        h1 { color: #ff4d6d; font-size: 1.4rem; min-height: 70px; margin-bottom: 20px; }
        .buttons { 
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px; 
            height: 150px; /* Area for No button to move in */
            position: relative;
        }
        button {
            font-size: 1.1rem;
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900; /* Bold highlighted text */
        }
        #yesBtn { background-color: #ff4d6d; color: white; z-index: 10; }
        #noBtn {
            background-color: #333333; /* High contrast Dark Grey */
            color: white;
            position: absolute;
            left: 60%;
            transition: all 0.15s ease-out;
            z-index: 5;
        }
        img { width: 180px; height: 180px; object-fit: contain; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="container">
        <img id="mainGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmdueHh3Z3Y0Z3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOebdEG8wT7p6jBh/giphy.gif" alt="Panda">
        <h1 id="question">Hey, I have something to tell you...</h1>
        
        <div class="buttons" id="moveArea">
            <button id="yesBtn" onclick="nextStep()">Continue</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        let step = 0;

        const content = [
            {
                text: "I just wanted to say... I love you ❤️",
                btn: "I love you too!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/K976VvOqhJ56M/giphy.gif"
            },
            {
                text: "Will you stay with me for the rest of my life?",
                btn: "Yes, forever!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/EatwJZRUIv41G/giphy.gif"
            },
            {
                text: "You make me the happiest person alive! 🌎✨",
                btn: "Click for a surprise",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/69id6xJvP1Ddm/giphy.gif"
            },
            {
                text: "Yay! I can't wait for our future together! 🥰❤️",
                btn: "I Love You!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L4lvBpHW2fXy0/giphy.gif"
            }
        ];

        function nextStep() {
            // Unique animations for every answer
            if (step === 1) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); // Standard Popper
            } else if (step === 2) {
                confetti({ particleCount: 100, shapes: ['star'], colors: ['#FFD700', '#FFFFFF'] }); // Star Shower
            } else if (step === 3) {
                var end = Date.now() + (2 * 1000);
                (function frame() {
                    confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }()); // Side Fireworks
            }

            if (step < content.length) {
                const item = content[step];
                document.getElementById('question').innerText = item.text;
                document.getElementById('yesBtn').innerText = item.btn;
                document.getElementById('mainGif').src = item.gif;
                
                // Reset No button inside the moveArea box
                const noBtn = document.getElementById('noBtn');
                noBtn.style.top = "0";
                noBtn.style.left = "60%";
                
                step++;
            } else {
                document.getElementById('yesBtn').style.display = 'none';
                document.getElementById('noBtn').style.display = 'none';
                document.getElementById('question').innerText = "You're stuck with me now! ❤️";
            }
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const moveArea = document.getElementById('moveArea');
            
            // Constrain movement inside the moveArea box only
            const maxX = moveArea.clientWidth - noBtn.clientWidth;
            const maxY = moveArea.clientHeight - noBtn.clientHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        }
    </script>
</body>
</html>
