<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message For You</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe5ec;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
            position: relative;
        }
        img { width: 200px; height: 200px; border-radius: 15px; margin-bottom: 15px; }
        h1 { color: #fb6f92; font-size: 1.5rem; height: 60px; }
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            height: 100px; /* Space for the button to move */
            position: relative;
        }
        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #yesBtn { background-color: #ffb7c5; color: white; }
        #noBtn {
            background-color: #fb6f92;
            color: white;
            position: absolute; /* This allows the smooth move animation */
            transition: all 0.2s ease;
        }
    </style>
</head>
<body>

    <div id="container">
        <img id="pandaGif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYwdWp6ZzZ3eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOebdEG8wT7p6jBh/giphy.gif" alt="Panda">
        <h1 id="text">Hey, I have something to tell you...</h1>
        
        <div class="btn-container">
            <button id="yesBtn" onclick="nextStep()">Continue</button>
            <button id="noBtn" onmouseover="dodge()" onclick="dodge()">No</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const steps = [
            {
                text: "I just wanted to say... I love you ❤️",
                btn: "I love you too!",
                gif: "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/K976VvOqhJ56M/giphy.gif"
            },
            {
                text: "Will you stay with me for the rest of my life?",
                btn: "Yes, forever!",
                gif: "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/EatwJZRUIv41G/giphy.gif"
            },
            {
                text: "You make me the happiest person alive! 🌎✨",
                btn: "Click for a surprise",
                gif: "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/69id6xJvP1Ddm/giphy.gif"
            }
        ];

        function nextStep() {
            // Confetti only for the "I love you too" answer
            if (currentStep === 1) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }

            if (currentStep < steps.length) {
                document.getElementById('text').innerText = steps[currentStep].text;
                document.getElementById('yesBtn').innerText = steps[currentStep].btn;
                document.getElementById('pandaGif').src = steps[currentStep].gif;
                
                // Reset No button position for each question
                const noBtn = document.getElementById('noBtn');
                noBtn.style.top = "0";
                noBtn.style.left = "60%"; 

                currentStep++;
            } else {
                document.getElementById('text').innerText = "Yay! I love you! ❤️";
                document.getElementById('yesBtn').style.display = "none";
                document.getElementById('noBtn').style.display = "none";
                document.getElementById('pandaGif').src = "https://media.giphy.com/media/L4lvBpHW2fXy0/giphy.gif";
            }
        }

        function dodge() {
            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('container');
            
            // Limit movement to inside the white box area
            const maxX = container.clientWidth - noBtn.clientWidth;
            const maxY = container.clientHeight - noBtn.clientHeight;

            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;

            noBtn.style.left = newX + "px";
            noBtn.style.top = newY + "px";
        }
    </script>
</body>
</html>
