<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be my Valentine?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }
        #card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 380px;
            position: relative;
            min-height: 450px;
        }
        img { 
            width: 220px; 
            height: 220px; 
            border-radius: 20px; 
            margin-bottom: 20px;
            object-fit: contain;
        }
        h1 { 
            color: #d0004e; 
            font-size: 1.6rem; 
            margin-bottom: 30px;
            line-height: 1.4;
        }
        .btn-box {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 80px;
            position: relative;
        }
        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #yesBtn { 
            background-color: #ff4d6d; 
            color: white; 
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        #noBtn {
            background-color: #f1f1f1;
            color: #333;
            position: absolute;
            left: 210px; /* Starting position */
            transition: all 0.2s ease-out; /* Smooth slide like the video */
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="card">
        <img id="displayGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMmdueHh3Z3Y0Z3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/v6aOebdEG8wT7p6jBh/giphy.gif" alt="Panda">
        <h1 id="mainText">Hey, I have something to tell you...</h1>
        
        <div class="btn-box">
            <button id="yesBtn" onclick="handleYes()">Continue</button>
            <button id="noBtn" onmouseover="dodgeNo()" onclick="dodgeNo()">No</button>
        </div>
    </div>

    <script>
        let step = 0;
        const scenarios = [
            {
                text: "I just wanted to say... I love you ❤️",
                btn: "I love you too!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/K976VvOqhJ56M/giphy.gif"
            },
            {
                text: "Will you stay with me for the rest of my life?",
                btn: "Yes, forever!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/EatwJZRUIv41G/giphy.gif"
            },
            {
                text: "You make me the happiest person alive! 🌎✨",
                btn: "Click for a surprise",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/69id6xJvP1Ddm/giphy.gif"
            },
            {
                text: "Yay! I can't wait for our future together! 🥰❤️",
                btn: "Done!",
                gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbnZ3ZzRnd3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L4lvBpHW2fXy0/giphy.gif"
            }
        ];

        function handleYes() {
            // Trigger Confetti ONLY when she clicks "I love you too!"
            if (step === 1) {
                const duration = 3 * 1000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 3,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: ['#ff4d6d', '#ffffff']
                    });
                    confetti({
                        particleCount: 3,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: ['#ff4d6d', '#ffffff']
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }

            if (step < scenarios.length) {
                document.getElementById('mainText').innerText = scenarios[step].text;
                document.getElementById('yesBtn').innerText = scenarios[step].btn;
                document.getElementById('displayGif').src = scenarios[step].gif;
                
                // Reset No button to initial side-by-side position
                const noBtn = document.getElementById('noBtn');
                noBtn.style.top = "15px"; 
                noBtn.style.left = "210px";
                
                step++;
            } else {
                document.getElementById('yesBtn').style.display = 'none';
                document.getElementById('noBtn').style.display = 'none';
                document.getElementById('mainText').innerText = "Sent with love! 💌";
            }
        }

        function dodgeNo() {
            const noBtn = document.getElementById('noBtn');
            const card = document.getElementById('card');
            
            // Calculate boundaries so it stays inside the white card
            const maxX = card.clientWidth - noBtn.clientWidth - 20;
            const maxY = card.clientHeight - noBtn.clientHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        }
    </script>
</body>
</html>
