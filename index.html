<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message For You</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        #container {
            padding: 30px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            width: 350px;
            position: relative;
            z-index: 10;
        }
        h1 { color: #ff4d6d; font-size: 1.5rem; min-height: 80px; font-weight: 800; }
        
        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            min-height: 120px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
        }

        #yesBtn { 
            background-color: #ff4d6d; 
            color: white;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        #noBtn {
            background-color: #333333; 
            color: white;
            font-size: 1rem;
            position: fixed; 
            transition: all 0.1s ease;
            z-index: 100;
        }

        img { width: 220px; height: 220px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="container">
        <img id="mainGif" src="https://i.giphy.com/v6aOebdEG8wT7p6jBh.gif" alt="Panda">
        <h1 id="question">Hey, I have something to tell you...</h1>
        
        <div class="buttons-container">
            <button id="yesBtn" onclick="nextStep()">Continue</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
        </div>
    </div>

    <script>
        let step = 0;
        let yesScale = 1;

        // FIXED DIRECT CDN LINKS
        const content = [
            {
                text: "I just wanted to say... I love you ❤️",
                btn: "I love you too!",
                noText: "I hate you", // Custom text for the first sentence
                gif: "panda-face.gif" // Your first uploaded GIF
            },
            {
                text: "Will you stay with me for the rest of my life?",
                btn: "Yes, forever!",
                noText: "No", // Reverted to 'No' for the second sentence
                gif: "giphy.gif" // Your second uploaded GIF
            },
            {
                text: "I'm gonna love you till my last breath ❤️🌎✨",
                btn: "Click for a surprise",
                noText: "No",
                gif: "https://i.giphy.com/69id6xJvP1Ddm.gif" // Keeping the original for the 3rd
            }
        ];

        window.onload = resetNoButton;

        function resetNoButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const rect = yesBtn.getBoundingClientRect();
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = (rect.right + 20) + "px";
            noBtn.style.top = rect.top + "px";
        }

        function nextStep() {
            if (step === 1) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            else if (step === 2) confetti({ particleCount: 200, shapes: ['star'], colors: ['#FFD700', '#ff4d6d'] });
            else if (step === 3) confetti({ particleCount: 250, spread: 160, origin: { y: 0.6 } });

            if (step < content.length) {
                const item = content[step];
                document.getElementById('question').innerText = item.text;
                document.getElementById('yesBtn').innerText = item.btn;
                document.getElementById('noBtn').innerText = item.noText;
                document.getElementById('mainGif').src = item.gif;
                
                yesScale = 1;
                document.getElementById('yesBtn').style.transform = `scale(${yesScale})`;
                
                setTimeout(resetNoButton, 10);
                step++;
            } else {
                document.getElementById('yesBtn').style.display = 'none';
                document.getElementById('noBtn').style.display = 'none';
                document.getElementById('question').innerText = "You're mine forever now! ❤️";
                document.getElementById('mainGif').src = "https://i.giphy.com/L4lvBpHW2fXy0.gif";
                confetti({ particleCount: 300, spread: 200, origin: { y: 0.5 } });
            }
        }

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');

            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;

            yesScale += 0.25;
            yesBtn.style.transform = `scale(${yesScale})`;
        }
    </script>
</body>
</html>
